    <div class="logo">

      Увійти через Google

    <div class="features">
      <div class="feature"><span>🤖</span><p>ШІ-інтерв'юер на базі Gemini</p></div>
      <div class="feature"><span>📈</span><p>Статистичний аналіз навичок та квартилі</p></div>
      <div class="feature"><span>🎯</span><p>Об'єктивна оцінка за 5 критеріями</p></div>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>

</html>
